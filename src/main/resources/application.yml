server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/englishTransfer
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: haicr147258369
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

app:
  jwt:
    secret: very-secret-key-change-this-in-production-very-secret-key
    expiration-ms: 86400000
  translate:
    google:
      # Put your Google Cloud Translation API key here (or via env var APP_TRANSLATE_GOOGLE_API_KEY)
      api-key: ${APP_TRANSLATE_GOOGLE_API_KEY:}
    ai:
      enabled: true
      url: ${APP_TRANSLATE_AI_URL:https://api.openai.com/v1/chat/completions}
      api-key: ${APP_TRANSLATE_AI_API_KEY:}
      model: ${APP_TRANSLATE_AI_MODEL:gpt-4o-mini}
    libre:
      enabled: true
      url: https://libretranslate.de/translate
    argos:
      enabled: true
      python-command: python
      script-path: tools/argos_translate.py
